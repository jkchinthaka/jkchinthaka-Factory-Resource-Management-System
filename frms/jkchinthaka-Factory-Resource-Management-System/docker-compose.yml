services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: fupms-backend
    restart: unless-stopped
    environment:
      DB_HOST: host.docker.internal
      DB_PORT: 1433
      DB_USER: nelna_user
      DB_PASSWORD: Nelna@123
      DB_NAME: nelnaapp
      DB_ENCRYPT: "true"
      DB_TRUST_CERT: "true"
      JWT_SECRET: your-super-secret-jwt-key-change-in-production
      JWT_EXPIRES_IN: 24h
      PORT: 5000
      NODE_ENV: production
      CORS_ORIGIN: http://localhost
    ports:
      - "5000:5000"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: fupms-frontend
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - backend
